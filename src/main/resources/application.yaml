spring:
  application:
    name: tinyurl

  datasource:
    url: jdbc:postgresql://postgres:5432/tinyurl_db
    username: tinyurl_user
    password: tinyurl_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages schema, not Hibernate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 3600000        # 1 hour in milliseconds

server:
  port: 8080

app:
  base-url: http://localhost:8080  # change to domain in prod